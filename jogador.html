<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Rios — Estrutura leve e responsiva — HTML e CSS puro, boas práticas de escritórios de design." />
  <title>Rios — Página Jogador</title>

   

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&display=swap"
    rel="stylesheet"
  >

      <!-- nova fonte araujo test -->
   <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;600;700;800;900&display=swap" rel="stylesheet">




   <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@500;700&display=swap" rel="stylesheet">
  <!-- nova fonte -->

  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/pages/jogador.css">
</head>

<body>
  <div id="header"></div>

  <main id="main">

    <section class="header-banner">
      <div class="player-header-container">
        <div class="club-header-background">
          <picture class="bg-texture-container">
            <source media="(min-width:1920px)" data-srcset="">
            <source media="(min-width:1200px)" data-srcset="">
            <source media="(min-width:800px)"  data-srcset="">
            <img class="bg-texture" 
                 src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" 
                 data-src="" 
                 alt="Banner do jogador">
          </picture>
        </div>

        <div class="player-content">
  <div class="player-info">
    <div class="player-name">
      <div class="player-number">9</div>
      <div class="player-fullname">
        <span class="firstName">Silva</span>
        <span class="lastName">Definindo</span>
      </div>
    </div>

    <div class="club-info">
      <img class="club-logo" src="" alt="Club Logo">
      <div class="club-text">
        <div class="player-position">POSIÇÃO</div>
        <div class="player-club">EQUIPA</div>
      </div>
    </div>
  </div>

  <div class="player-photo">
  
  <div class="shirt-wrapper">
    <img class="player-photo-img" src="camisola.webp" alt="Player">

    <div class="shirt-overlay">
      <div class="shirt-name"></div>
      <div class="shirt-number"></div>
    </div>
  </div>

</div>
</div>
      </div>
    </section>

    <!-- KEY STATS DO JOGADOR -->
    <div class="topscore-container container-largura">
      <section class="key-stats-card">
        

        <div class="ks-right">
  
  <div class="stats-toggle">
    <button id="btn-season" class="active">Estatísticas</button>
    <button id="btn-career">Info</button>
  </div>

  <div class="stats-grid">
    <div class="stat-item">
      <div class="stat-label">Altura</div>
      <div class="stat-number" id="height">0</div>
    </div>

    <div class="stat-item">
      <div class="stat-label">Pé preferido</div>
      <div class="stat-number" id="preferredFoot">0</div>
    </div>

    <div class="stat-item">
      <div class="stat-label">Jogos</div>
      <div class="stat-number" id="games">0</div>
    </div>

    <div class="stat-item">
      <div class="stat-label">Vitórias</div>
      <div class="stat-number" id="wins">0</div>
    </div>

    <div class="stat-item">
      <div class="stat-label">Empates</div>
      <div class="stat-number" id="draws">0</div>
    </div>

    <div class="stat-item">
      <div class="stat-label">Derrotas</div>
      <div class="stat-number" id="defeats">0</div>
    </div>

    <div class="stat-item">
      <div class="stat-label">Golos</div>
      <div class="stat-number" id="goals">0</div>
    </div>

    <div class="stat-item">
      <div class="stat-label">Cartão amarelo</div>
      <div class="stat-number" id="yellowCards">0</div>
    </div>

    <div class="stat-item">
      <div class="stat-label">Cartão vermelho</div>
      <div class="stat-number" id="redCards">0</div>
    </div>
  </div>

</div>
        </div>
      </section>
    </div>

    <!-- SLIDER DE JOGOS -->
    <div class="tabelapontos-container container-largura">
      <section class="mu-slider-wrapper">
        <div class="mu-slider-head">
          <h2 class="mu-slider-title">
            <span class="jogos">Jogos</span>
            <a href="#" class="mu-slider-link">Ver todos Jogos</a>
          </h2>
        </div>

        <div class="mu-slider">
          <button class="mu-slider-btn prev" aria-label="Previous">‹</button>
          <div class="mu-slider-track" id="games-track"></div>
          <button class="mu-slider-btn next" aria-label="Next">›</button>
        </div>
      </section>
    </div>










    <!-- SLIDER DE TEAMMATES -->
<div class="teammates-container container-largura">
  <section class="mu-slider-wrapper">
    <div class="mu-slider-head">
      <h2 class="mu-slider-title">
        <span class="jogos">Colegas de equipa</span>
      </h2>
    </div>

    <div class="mu-slider">
      <button class="mu-slider-btn prev" aria-label="Previous">‹</button>
      <div class="mu-slider-track" id="teammates-track">
        <!-- Jogadores serão inseridos aqui via JS -->
      </div>
      <button class="mu-slider-btn next" aria-label="Next">›</button>
    </div>
  </section>
</div>


  </main>

  <div id="footer"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <script src="assets/js/pages/jogador.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/pages/header-nav.js"></script>



  <script src="assets/js/pages/theme.js"></script>
</body>
</html>
